apiVersion: v1
kind: Namespace
metadata:
  name: podinfo
---
# apiVersion: source.toolkit.fluxcd.io/v1
# kind: GitRepository
# metadata:
#   name: flux-sync
#   namespace: flux-system
# spec:
#   interval: 1m
#   url: https://github.com/sohel2020/flux-values-override-demo.git
#   ref:
#     branch: main
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: podinfo
  namespace: podinfo
spec:
  interval: 5m
  url: oci://ghcr.io/stefanprodan/charts/podinfo
  ref:
    tag: 6.14.0
---
apiVersion: source.extensions.fluxcd.io/v1beta1
kind: ArtifactGenerator
metadata:
  name: podinfo
  namespace: podinfo
spec:
  sources:
    - alias: chart
      kind: OCIRepository
      name: podinfo
      namespace: podinfo
    - alias: repo
      kind: GitRepository
      name: flux-sync
      namespace: flux-system
  artifacts:
    - name: podinfo
      originRevision: "@chart"
      copy:
        # unpacked podinfo chart from OCI -> @artifact/podinfo/
        - from: "@chart/"
          to: "@artifact/"
        # overlay tenant values onto the chart's values.yaml
        - from: "@repo/values/${tenantName}-values.yaml*"
          to: "@artifact/podinfo/values.yaml"
          strategy: Merge
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  interval: 1m
  releaseName: podinfo
  chartRef:
    kind: ExternalArtifact
    name: podinfo
    namespace: podinfo
