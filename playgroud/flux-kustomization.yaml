apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-sync
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/sohel2020/flux-values-override-demo.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: playgroud-podinfo
  namespace: flux-system
spec:
  interval: 1m
  path: ./playgroud
  prune: true
  wait: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-sync
    namespace: flux-system
  postBuild:
    substitute:
      tenantName: tarikur
