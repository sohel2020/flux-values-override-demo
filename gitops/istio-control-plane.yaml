apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-control-plane
  namespace: istio-system
spec:
  dependsOn:
    - name: istio-sail-operator
      namespace: istio-system
  interval: 1m
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    crds: CreateReplace
  rollback:
    recreate: true
    cleanupOnFail: true
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: ${helmChartDirectory}/istio-control-plane
      sourceRef:
        kind: GitRepository
        name: flux-sync
        namespace: istio-system
      interval: 1m
  targetNamespace: istio-system
  values:
    istio:
      enabled: true
    meshDefault:
      mtls: PERMISSIVE
