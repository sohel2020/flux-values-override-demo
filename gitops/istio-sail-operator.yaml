apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sail-operator
  namespace: istio-system
spec:
  interval: 1m
  url: https://istio-ecosystem.github.io/sail-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-sail-operator
  namespace: istio-system
spec:
  interval: 1m
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    crds: CreateReplace
  rollback:
    recreate: true
    cleanupOnFail: true
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: sail-operator
      version: "1.26.3"
      sourceRef:
        kind: HelmRepository
        name: sail-operator
        namespace: istio-system
      interval: 1m
  targetNamespace: istio-system
