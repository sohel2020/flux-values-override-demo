{{- if .Values.tracing.enabled }}
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: {{ .Values.istio.namespace }}
spec:
  tracing:
    - providers:
        - name: {{ .Values.tracing.providerName }}
      randomSamplingPercentage: {{ .Values.tracing.samplingPercentage }}
      {{- with .Values.tracing.customTags }}
      customTags:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
