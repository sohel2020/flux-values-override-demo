{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  APP_ENV: "demo"
  LOG_LEVEL: "info"
  FEATURE_FLAG_NEW_UI: "true"
  CACHE_TTL: "300"
  API_TIMEOUT: "30s"
  GREETING_MESSAGE: "Hello from values-override-demo"
{{- end }}
